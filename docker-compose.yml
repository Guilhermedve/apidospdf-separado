services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  pdf-api:
    image: ghcr.io/guilhermedve/apidospdf-separado:latest
    build: .
    restart: unless-stopped
    env_file: .env
    command: ["node", "dist/main.js"]
    ports:
      - "127.0.0.1:${PDF_API_HOST_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - reports:/app/storage/reports
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health',{headers:{'x-api-key':process.env.API_KEYS.split(',')[0]}}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  pdf-worker:
    image: ghcr.io/guilhermedve/apidospdf-separado:latest
    build: .
    restart: unless-stopped
    env_file: .env
    command: ["node", "dist/worker.js"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - reports:/app/storage/reports
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
  reports:
