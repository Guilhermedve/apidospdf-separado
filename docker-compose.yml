services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Produção roda somente a imagem publicada no GHCR. Para buildar localmente
  # use o override de dev: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
  pdf-api:
    image: ghcr.io/guilhermedve/apidospdf-separado:latest
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    env_file: .env
    command: ["node", "dist/main.js"]
    ports:
      - "127.0.0.1:${PDF_API_HOST_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - reports:/app/storage/reports
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health',{headers:{'x-api-key':(process.env.API_KEYS||'').split(',')[0]}}).then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  pdf-worker:
    image: ghcr.io/guilhermedve/apidospdf-separado:latest
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    env_file: .env
    command: ["node", "dist/worker.js"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - reports:/app/storage/reports
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const Redis=require('ioredis');const r=new Redis(process.env.REDIS_URL,{lazyConnect:true,connectTimeout:3000,maxRetriesPerRequest:0});r.connect().then(()=>r.ping()).then(v=>process.exit(v==='PONG'?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    environment:
      TZ: America/Fortaleza
      DOCKER_API_VERSION: ${DOCKER_API_VERSION:-1.40}
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-300}
      REPO_USER: ${WATCHTOWER_REPO_USER:-}
      REPO_PASS: ${WATCHTOWER_REPO_PASS:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "/watchtower", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      com.centurylinklabs.watchtower.enable: "false"

volumes:
  redis-data:
  reports:
