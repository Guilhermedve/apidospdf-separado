name: Build, publish and deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=sha

      - name: Build and publish ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.event_name != 'pull_request'
    needs: build-and-publish
    runs-on: [self-hosted, linux, ARM64]
    env:
      DEPLOY_PATH: ${{ vars.PI_DEPLOY_PATH }}

    steps:
      - name: Validate deployment directory
        run: |
          test -n "$DEPLOY_PATH"
          test -d "$DEPLOY_PATH/.git"
          test -f "$DEPLOY_PATH/.env"
          test -f "$DEPLOY_PATH/docker-compose.yml"

      - name: Update repository on Raspberry Pi
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          git fetch origin main
          git switch main
          git merge --ff-only "$GITHUB_SHA"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and restart services
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          docker compose config --quiet
          docker compose pull
          docker compose up -d --remove-orphans

      - name: Verify PDF API health
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          for _ in $(seq 1 12); do
            if docker compose exec -T pdf-api node -e "fetch('http://127.0.0.1:3000/health',{headers:{'x-api-key':process.env.API_KEYS.split(',')[0]}}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then
              docker compose ps
              exit 0
            fi
            sleep 5
          done
          docker compose logs --tail=100 pdf-api pdf-worker
          exit 1
